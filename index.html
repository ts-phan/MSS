// ─────────────────────────────────────────────────────────────────
// API GEMINI (Texte et Audio)
// ─────────────────────────────────────────────────────────────────
const GEMINI_MODEL = "gemini-1.5-flash";
const GEMINI_TTS_MODEL = "gemini-2.5-flash-preview-tts";

let cachedModel = null;

async function getBestModel(apiKey) {
  if (cachedModel) return cachedModel;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
    if (!res.ok) {
       console.error("Erreur ListModels, utilisation du fallback.");
       return "gemini-1.5-flash"; 
    }
    const data = await res.json();
    const valid = (data.models || []).filter(m => m.supportedGenerationMethods?.includes("generateContent"));
    
    // Découverte du meilleur modèle autorisé pour votre clé spécifique
    const flash15 = valid.find(m => m.name.includes("gemini-1.5-flash"));
    const flash8b = valid.find(m => m.name.includes("gemini-1.5-flash-8b"));
    const pro15 = valid.find(m => m.name.includes("gemini-1.5-pro"));
    const geminiPro = valid.find(m => m.name.includes("gemini-pro"));
    
    // On sélectionne le premier valide trouvé, ou le tout premier de la liste
    const chosen = flash15 || flash8b || pro15 || geminiPro || valid[0];
    
    if (chosen) {
      cachedModel = chosen.name.replace('models/', '');
      console.log("✅ Modèle IA auto-détecté par le système :", cachedModel);
      return cachedModel;
    }
  } catch(e) {
    console.error("Erreur réseau lors de la découverte des modèles:", e);
  }
  return "gemini-1.5-flash"; 
}

async function callGeminiAPI(apiKey, prompt, systemInstructionText, jsonSchema = null) {
  if (!apiKey) return { error: "Clé API manquante." };
  
  const targetModel = await getBestModel(apiKey);
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`;
  
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { parts: [{ text: systemInstructionText }] }
  };

  if (jsonSchema) {
    payload.generationConfig = { responseMimeType: "application/json", responseSchema: jsonSchema };
  }

  try {
    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    
    if (!response.ok) {
       const errData = await response.json();
       return { error: `Erreur API Google (${targetModel}) : ${errData.error?.message || response.statusText}` };
    }
    
    const result = await response.json();
    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
    
    if (jsonSchema && text) {
      try {
        return JSON.parse(text.replace(/```json/gi, '').replace(/```/g, '').trim());
      } catch(e) { return { error: "Format JSON renvoyé invalide." }; }
    }
    return text || { error: "L'IA n'a retourné aucun texte." };
  } catch (error) {
     return { error: `Erreur de connexion : ${error.message}` };
  }
}

async function callGeminiTTS(apiKey, text, voiceName = "Aoede") {
  if (!apiKey) return null;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${apiKey}`;
  const payload = {
    contents: [{ parts: [{ text: text }] }],
    generationConfig: {
      responseModalities: ["AUDIO"],
      speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
    },
    model: GEMINI_TTS_MODEL
  };
  
  const delays = [1000, 2000, 4000, 8000, 16000];
  for (let attempt = 0; attempt < 5; attempt++) {
    try {
      const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!response.ok) throw new Error(`TTS HTTP error! status: ${response.status}`);
      const result = await response.json();
      return result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    } catch (error) {
      if (attempt === 4) return null;
      await new Promise(res => setTimeout(res, delays[attempt]));
    }
  }
}

// Convertisseur PCM -> WAV pour navigateur
function pcmToWav(pcmData, sampleRate) {
  const numChannels = 1;
  const bitsPerSample = 16;
  const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
  const blockAlign = numChannels * (bitsPerSample / 8);
  const wavHeader = new ArrayBuffer(44);
  const view = new DataView(wavHeader);

  const writeString = (view, offset, string) => {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  };

  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + pcmData.length, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(view, 36, 'data');
  view.setUint32(40, pcmData.length, true);

  const wavBytes = new Uint8Array(44 + pcmData.length);
  wavBytes.set(new Uint8Array(wavHeader), 0);
  wavBytes.set(pcmData, 44);
  return wavBytes;
}

// ─────────────────────────────────────────────────────────────────
// MOTEUR PHYSIQUE ET MATHÉMATIQUES
// ─────────────────────────────────────────────────────────────────
function computeCurves(p) {
  const {
    vitesse, lambda_rugo,
    M_ns, A_rail, rho_rail, a_RS,
    k_pad, zeta_pad,
    m_traverse,
    k_semelle_traverse, zeta_semelle_traverse,
    h_dalle, b_dalle, rho_beton, h_top, rho_top,
    C_MSS, zeta_MSS
  } = p;

  const v_ms = vitesse / 3.6; 
  const a_RS_m = a_RS / 1000; 
  const lambda_m = lambda_rugo / 1000;
  
  const f_passage = v_ms / a_RS_m;     
  const f_rugosite = v_ms / lambda_m;  

  // ── Masses des 3 étages (tributaires, sur l'entraxe a_RS) ──
  const m_rail = rho_rail * A_rail * a_RS;
  const m1 = m_rail + M_ns;              // m1 = RAIL (+ masse non suspendue roue)
  const m2 = m_traverse;                  // m2 = TRAVERSE / BLOCHET
  const m3_beton = rho_beton * h_dalle * b_dalle * a_RS;
  const m3_top = rho_top * h_top * b_dalle * a_RS;
  const m3 = m3_beton + m3_top;           // m3 = DALLE (+ couche superieure)

  // ── Raideurs des 3 étages ──
  const k1 = k_pad * 1000000;                                  // rail pad [N/m]
  const k2 = k_semelle_traverse * 1000000;                     // semelle sous traverse [N/m]
  const k3 = C_MSS * b_dalle * a_RS * 1000;                    // tapis/plot sous dalle (MSS) [N/m]

  const c1 = 2 * zeta_pad * Math.sqrt(k1 * m1);
  const c2 = 2 * zeta_semelle_traverse * Math.sqrt(k2 * m2);
  const c3 = 2 * zeta_MSS * Math.sqrt(k3 * m3);

  // ── Fréquences propres du système à 3 DDL (racines du polynôme caractéristique) ──
  // det(-Mw² + K) = 0 en non-amorti, degré 3 en w² -> on résout numériquement
  // par balayage + raffinement (plus robuste en JS qu'une formule de Cardan directe).
  const charPoly = (w2) => {
    const A11 = -m1*w2 + k1;
    const A22 = -m2*w2 + k1 + k2;
    const A33 = -m3*w2 + k2 + k3;
    return A11*(A22*A33 - k2*k2) - k1*k1*A33;
  };
  // Balayage grossier en Hz puis raffinement par bissection sur les changements de signe
  const roots = [];
  const fMaxScan = 400, steps = 4000;
  let prevF = 0.5, prevVal = charPoly((2*Math.PI*prevF)**2);
  for (let i = 1; i <= steps; i++) {
    const f = 0.5 + (fMaxScan - 0.5) * i / steps;
    const val = charPoly((2*Math.PI*f)**2);
    if (prevVal === 0 || (prevVal > 0) !== (val > 0)) {
      // bissection
      let lo = prevF, hi = f, vLo = prevVal;
      for (let it = 0; it < 50; it++) {
        const mid = (lo + hi) / 2;
        const vMid = charPoly((2*Math.PI*mid)**2);
        if ((vMid > 0) === (vLo > 0)) { lo = mid; vLo = vMid; } else { hi = mid; }
      }
      roots.push(Math.round((lo + hi) / 2 * 100) / 100);
    }
    prevF = f; prevVal = val;
  }
  const f0_modes = roots.slice(0, 3);          // les 3 fréquences propres (ordre croissant)
  const f0_dyn = f0_modes[0] ?? 0;              // mode dominant (le plus bas, généralement le plus excité)

  // ── Référence : rail seul (m1) sur radier rigide via le rail pad (k1) ──
  const w_ref = Math.sqrt(k1 / m1);
  const f_ref_dyn = Math.round((w_ref / (2 * Math.PI)) * 10) / 10;

  let freqs = [4, 5, 6.3, 8, 10, 12.5, 16, 20, 25, 31.5, 40, 50, 63, 80, 100, 125, 160, 200, 250];
  f0_modes.forEach(fm => { if (!freqs.includes(fm) && fm >= 4 && fm <= 250) freqs.push(fm); });
  if (!freqs.includes(f_ref_dyn)) freqs.push(f_ref_dyn);
  
  const f_pass_rounded = Math.round(f_passage * 10) / 10;
  const f_rugo_rounded = Math.round(f_rugosite * 10) / 10;
  
  if (!freqs.includes(f_pass_rounded) && f_pass_rounded >= 4 && f_pass_rounded <= 250) freqs.push(f_pass_rounded);
  if (!freqs.includes(f_rugo_rounded) && f_rugo_rounded >= 4 && f_rugo_rounded <= 250) freqs.push(f_rugo_rounded);
  
  freqs.sort((a, b) => a - b);

  const cAdd = (a, b) => [a[0]+b[0], a[1]+b[1]];
  const cSub = (a, b) => [a[0]-b[0], a[1]-b[1]];
  const cMul = (a, b) => [a[0]*b[0] - a[1]*b[1], a[0]*b[1] + a[1]*b[0]];
  const cDiv = (n, d) => {
    const den = d[0]*d[0] + d[1]*d[1];
    return [(n[0]*d[0] + n[1]*d[1])/den, (n[1]*d[0] - n[0]*d[1])/den];
  };
  const cAbs = (a) => Math.sqrt(a[0]*a[0] + a[1]*a[1]);

  // ── T_sys : force transmise au radier / force appliquée sur le rail ──
  //   Chaîne : F(t) → m1(rail) --K1-- m2(traverse) --K2-- m3(dalle) --K3-- Radier fixe
  //   T_sys = K1.K2.K3 / det[A]      avec
  //   det[A] = A11.(A22.A33 - K2²) - K1².A33
  //   A11 = -m1w²+K1 ; A22 = -m2w²+K1+K2 ; A33 = -m3w²+K2+K3
  const computeTsys = (f) => {
    const w = 2 * Math.PI * f;
    const k1c = [k1, w * c1];
    const k2c = [k2, w * c2];
    const k3c = [k3, w * c3];
    const m1c = [-m1 * w * w, 0];
    const m2c = [-m2 * w * w, 0];
    const m3c = [-m3 * w * w, 0];

    const A11 = cAdd(m1c, k1c);                           // -m1w² + K1
    const A22 = cAdd(m2c, cAdd(k1c, k2c));                // -m2w² + K1+K2
    const A33 = cAdd(m3c, cAdd(k2c, k3c));                // -m3w² + K2+K3

    const inner = cSub(cMul(A22, A33), cMul(k2c, k2c));   // A22.A33 - K2²
    const detSys = cSub(cMul(A11, inner), cMul(k1c, cMul(k1c, A33))); // A11.inner - K1².A33
    const numSys = cMul(cMul(k1c, k2c), k3c);             // K1.K2.K3
    const tfSys = cDiv(numSys, detSys);

    return { w, k1c, k2c, k3c, m1c, m2c, m3c, A11, A22, A33, inner, detSys, numSys, tfSys,
             tfSysMag: cAbs(tfSys), tfSysDb: 20*Math.log10(cAbs(tfSys)) };
  };

  // ── T_ref : rail seul (m1) sur radier rigide via K1 (référence "semelle seule") ──
  const computeTref = (f) => {
    const w = 2 * Math.PI * f;
    const k1c = [k1, w * c1];
    const m1c = [-m1 * w * w, 0];
    const termRef = cAdd(m1c, k1c);
    const tfRef = cDiv(k1c, termRef);
    return { w, k1c, m1c, termRef, tfRef, tfRefMag: cAbs(tfRef), tfRefDb: 20*Math.log10(cAbs(tfRef)) };
  };

  const data = freqs.map(f => {
    const sys = computeTsys(f);
    const ref = computeTref(f);
    const IL = ref.tfRefDb - sys.tfSysDb;
    return { f, Tsys: round2(sys.tfSysDb), Tref: round2(ref.tfRefDb), IL: round2(IL) };
  });

  const detailAtF0 = computeTsys(f0_dyn);
  const detailAtFref = computeTref(f_ref_dyn);
  // Fusion pour compat avec l'affichage existant (mêmes clés que l'ancienne version 2DDL)
  detailAtF0.f = f0_dyn;
  detailAtFref.f = f_ref_dyn;
  detailAtFref.tfRef = detailAtFref.tfRef; // (déjà présent)

  return { 
    data, f0_dyn, f0_modes, f_ref_dyn, f_passage: f_pass_rounded, f_rugosite: f_rugo_rounded, v_ms,
    details: { m1, m2, m3, m_rail, m3_beton, m3_top, k1, k2, k3, c1, c2, c3 },
    detailAtF0, detailAtFref
  };
}

function round2(x) { return Math.round(x * 100) / 100; }

// ─────────────────────────────────────────────────────────────────
// Calcule les grandeurs intermédiaires (module de K1, K2, termes de la
// matrice, module du déterminant) pour une fréquence donnée — utilisé
// pour peupler la table détaillée de l'onglet "Détails".
// ─────────────────────────────────────────────────────────────────
function buildDetailRow(f, params, details) {
  const { k1, k2, k3, c1, c2, c3, m1, m2, m3 } = details;
  const w = 2 * Math.PI * f;

  const cMul = (a, b) => [a[0]*b[0] - a[1]*b[1], a[0]*b[1] + a[1]*b[0]];
  const cSub = (a, b) => [a[0]-b[0], a[1]-b[1]];
  const cAdd = (a, b) => [a[0]+b[0], a[1]+b[1]];
  const cAbs = (a) => Math.sqrt(a[0]*a[0] + a[1]*a[1]);

  const K1 = [k1, w * c1];
  const K2 = [k2, w * c2];
  const K3 = [k3, w * c3];
  const m1w2 = -m1 * w * w;
  const m2w2 = -m2 * w * w;
  const m3w2 = -m3 * w * w;

  const A11 = [m1w2 + K1[0], K1[1]];
  const A22 = cAdd([m2w2, 0], cAdd(K1, K2));
  const A33 = cAdd([m3w2, 0], cAdd(K2, K3));
  const inner = cSub(cMul(A22, A33), cMul(K2, K2));
  const det = cSub(cMul(A11, inner), cMul(K1, cMul(K1, A33)));

  return {
    w, K1mag: cAbs(K1), K2mag: cAbs(K2), K3mag: cAbs(K3), m1w2, m2w2, m3w2, detMag: cAbs(det)
  };
}

function Slider({ label, unit, value, min, max, step, onChange, formatValue, color = "#ea580c" }) {
  const displayVal = formatValue ? formatValue(value) : value;
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 4 }}>
        <span style={{ fontWeight: 600, color: '#334155' }}>{label}</span>
        <span style={{ fontWeight: 700, color: color }}>{displayVal} <span style={{ color: '#94a3b8', fontWeight: 500 }}>{unit}</span></span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))}
        style={{
          width: '100%', height: 4, borderRadius: 2, appearance: 'none',
          background: `linear-gradient(to right, ${color} 0%, ${color} ${((value - min) / (max - min)) * 100}%, #e2e8f0 ${((value - min) / (max - min)) * 100}%, #e2e8f0 100%)`
        }}
      />
    </div>
  );
}

function Stat({ label, value, unit, highlightColor }) {
  return (
    <div className="card" style={{ flex: 1, padding: '12px', textAlign: 'center', borderTop: highlightColor ? `3px solid ${highlightColor}` : '1px solid #e1e4e8' }}>
      <div style={{ fontSize: 9.5, textTransform: 'uppercase', color: '#64748b', letterSpacing: 0.5, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: highlightColor || '#0f172a', marginTop: 6 }}>
        {value} <span style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8' }}>{unit}</span>
      </div>
    </div>
  );
}

function FormattedText({ text }) {
  const formatMarkdown = (md) => {
    return md
      .replace(/### (.*?)\n/g, '<h3>$1</h3>')
      .replace(/## (.*?)\n/g, '<h2>$1</h2>')
      .replace(/# (.*?)\n/g, '<h1>$1</h1>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br/><br/>')
      .replace(/\n/g, '<br/>')
      .replace(/- (.*?)<br\/>/g, '<li>$1</li>')
      .replace(/<li>(.*?)<\/li>/g, '<ul>$&</ul>')
      .replace(/<\/ul><ul>/g, ''); 
  };
  return <div className="md-content" dangerouslySetInnerHTML={{ __html: formatMarkdown(text) }} />;
}

// ─────────────────────────────────────────────────────────────────
// Affichage d'un nombre complexe [re, im] formaté "a + bi"
// ─────────────────────────────────────────────────────────────────
function ComplexVal({ c, unit = "", digits = 3 }) {
  const [re, im] = c;
  const sign = im >= 0 ? '+' : '−';
  return (
    <span className="math-val">
      {re.toExponential(digits)} {sign} {Math.abs(im).toExponential(digits)}<em>i</em>
      {unit && <span style={{ color: '#94a3b8' }}> {unit}</span>}
    </span>
  );
}

// Petite cellule de matrice 2x2 pour l'affichage visuel
function MatrixCell({ label, value, bg }) {
  return (
    <div style={{
      background: bg || '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 6,
      padding: '10px 12px', textAlign: 'center', minWidth: 0,
    }}>
      <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 700, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 11.5, fontFamily: "'IBM Plex Mono', monospace", color: '#0f172a', wordBreak: 'break-all' }}>{value}</div>
    </div>
  );
}

                    <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginTop: 10 }}>
                      <div style={{ fontSize: 13, fontFamily: "'IBM Plex Mono', monospace", background: '#fff', padding: '6px 12px', border: '1px solid #e9d5ff', borderRadius: 4 }}>
                        f_rugo = v / λ
                      </div>

                    </div>

                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
                <div className="card">
                  <h3 style={{ marginTop: 0, fontSize: 14, borderBottom: '1px solid #e2e8f0', paddingBottom: 8 }}>Vecteur Masse [M] — 3 étages</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                    <div><div className="math-lbl">m1_rail</div><div className="math-val">{details.m_rail.toFixed(2)} kg</div></div>
                    <div><div className="math-lbl">m1_non_susp (roue)</div><div className="math-val">{params.M_ns.toFixed(2)} kg</div></div>

                    <div><div className="math-lbl" style={{color:'#ea580c'}}>Total m1 (rail)</div><div className="math-val" style={{fontWeight:700}}>{details.m1.toFixed(2)} kg</div></div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 12, paddingTop: 12, borderTop: '1px solid #f1f5f9' }}>

                    <div style={{ display: 'flex', justifyContent: 'space-between' }}><span className="math-lbl">c1 — Amort. rail pad</span><span className="math-val">{(details.c1).toExponential(3)} N.s/m</span></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 12 }}><span className="math-lbl">k2 — Semelle sous traverse</span><span className="math-val">{(details.k2).toExponential(3)} N/m</span></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}><span className="math-lbl">c2 — Amort. semelle traverse</span><span className="math-val">{(details.c2).toExponential(3)} N.s/m</span></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 12 }}><span className="math-lbl">k3 — Tapis/plot (MSS)</span><span className="math-val">{(details.k3).toExponential(3)} N/m</span></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}><span className="math-lbl">c3 — Amort. tapis/plot</span><span className="math-val">{(details.c3).toExponential(3)} N.s/m</span></div>

                  {f0_modes && f0_modes.length > 0 && (

              {/* ═══════════════════════════════════════════════════════════

                  ═══════════════════════════════════════════════════════════ */}
              <div className="card">
                <h3 style={{ marginTop: 0, fontSize: 15, borderBottom: '1px solid #e2e8f0', paddingBottom: 8, color: '#0f172a' }}>
                  📐 Calcul détaillé — Matrice du système à 3 étages et fonctions de transfert
                </h3>

                <div style={{ fontSize: 12.5, color: '#475569', lineHeight: 1.6, marginBottom: 18 }}>
                  Le rail (masse m1) est excité par une force harmonique unitaire et repose sur le <strong>rail pad</strong> (k1/c1).
                  Le rail pad transmet l'effort à la <strong>traverse</strong> (masse m2), elle-même portée par la <strong>semelle
                  sous traverse</strong> (k2/c2). La semelle transmet à son tour l'effort à la <strong>dalle</strong> (masse m3),
                  posée sur le <strong>tapis/plot élastomère</strong> (k3/c3, MSS) qui repose enfin sur le radier fixe.
                  <strong> T_sys</strong> est le rapport entre la force transmise au radier à travers les 3 étages en série
                  et la force appliquée sur le rail. <strong>T_ref</strong> reste le cas de référence où le rail repose
                  <em> directement</em> sur un radier infiniment rigide via le rail pad seul (sans traverse, semelle, dalle ni tapis).
                </div>

                {/* Schéma topologique à 3 étages */}
                <div style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                  background: '#f8fafc', border: '1px dashed #cbd5e1', borderRadius: 8,

                }}>
                  <span style={{ background: '#fee2e2', border: '1px solid #fecaca', borderRadius: 6, padding: '6px 10px', fontWeight: 700 }}>F(t) → m1 (rail)</span>
                  <span style={{ color: '#94a3b8' }}>──[k1,c1]<br/>rail pad──</span>
                  <span style={{ background: '#fef3c7', border: '1px solid #fde68a', borderRadius: 6, padding: '6px 10px', fontWeight: 700 }}>m2 (traverse)</span>
                  <span style={{ color: '#94a3b8' }}>──[k2,c2]<br/>semelle──</span>
                  <span style={{ background: '#dbeafe', border: '1px solid #bfdbfe', borderRadius: 6, padding: '6px 10px', fontWeight: 700 }}>m3 (dalle)</span>
                  <span style={{ color: '#94a3b8' }}>──[k3,c3]<br/>tapis/MSS──</span>
                  <span style={{ background: '#e2e8f0', border: '1px solid #cbd5e1', borderRadius: 6, padding: '6px 10px', fontWeight: 700 }}>⏚ Radier fixe</span>
                </div>

                {/* Équations du mouvement */}
                <h4 style={{ fontSize: 13, color: '#0f172a', marginBottom: 8 }}>1. Équations du mouvement (PFD sur chaque masse)</h4>
                <div style={{ background: '#0f172a', color: '#e2e8f0', borderRadius: 8, padding: 16, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, lineHeight: 1.9, marginBottom: 20, overflowX: 'auto' }}>
                  <div>m1·ẍ1 + k1·(x1−x2) + c1·(ẋ1−ẋ2) = F(t)                          <span style={{color:'#94a3b8'}}>// rail</span></div>
                  <div>m2·ẍ2 + k2·(x2−x3) + c2·(ẋ2−ẋ3) − k1·(x1−x2) − c1·(ẋ1−ẋ2) = 0    <span style={{color:'#94a3b8'}}>// traverse</span></div>
                  <div>m3·ẍ3 + k3·x3 + c3·ẋ3 − k2·(x2−x3) − c2·(ẋ2−ẋ3) = 0              <span style={{color:'#94a3b8'}}>// dalle</span></div>
                </div>

                {/* Passage au régime harmonique */}
                <h4 style={{ fontSize: 13, color: '#0f172a', marginBottom: 8 }}>2. Régime harmonique — notation complexe (x = X·e^(jωt))</h4>
                <div style={{ fontSize: 12.5, color: '#475569', marginBottom: 10 }}>
                  On pose les impédances complexes <strong>K1 = k1+jωc1</strong>, <strong>K2 = k2+jωc2</strong>,
                  <strong> K3 = k3+jωc3</strong>. Le système se met sous forme matricielle <strong>[A]·{'{X}'} = {'{F}'}</strong> (matrice 3×3, tridiagonale) :
                </div>
                <div style={{ background: '#0f172a', color: '#e2e8f0', borderRadius: 8, padding: 16, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, lineHeight: 1.9, marginBottom: 20, overflowX: 'auto' }}>
                  <div>[ −m1ω²+K1      −K1            0        ]   [X1]   [F0]</div>
                  <div>[   −K1     −m2ω²+K1+K2      −K2        ] · [X2] = [0 ]</div>
                  <div>[    0          −K2        −m3ω²+K2+K3  ]   [X3]   [0 ]</div>
                </div>

                {/* Matrice numérique à f0_dyn */}
                <h4 style={{ fontSize: 13, color: '#0f172a', marginBottom: 8 }}>
                  3. Application numérique au mode dominant (f₀ = {f0_dyn} Hz, ω = {detailAtF0.w.toFixed(2)} rad/s)
                </h4>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 10 }}>
                  <MatrixCell label="K1 = k1+jωc1 (rail pad)" value={<ComplexVal c={detailAtF0.k1c} unit="N/m" />} bg="#fef2f2" />
                  <MatrixCell label="K2 = k2+jωc2 (semelle trav.)" value={<ComplexVal c={detailAtF0.k2c} unit="N/m" />} bg="#fffbeb" />
                  <MatrixCell label="K3 = k3+jωc3 (tapis/MSS)" value={<ComplexVal c={detailAtF0.k3c} unit="N/m" />} bg="#eff6ff" />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 14 }}>
                  <MatrixCell label="−m1ω²" value={<span className="math-val">{detailAtF0.m1c[0].toExponential(3)}</span>} />
                  <MatrixCell label="−m2ω²" value={<span className="math-val">{detailAtF0.m2c[0].toExponential(3)}</span>} />
                  <MatrixCell label="−m3ω²" value={<span className="math-val">{detailAtF0.m3c[0].toExponential(3)}</span>} />
                </div>

                <div className="math-lbl" style={{ marginBottom: 6 }}>Matrice [A] — diagonale et couplages (termes non nuls)</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 16 }}>
                  <MatrixCell label="A11 = −m1ω²+K1" value={<ComplexVal c={detailAtF0.A11} />} bg="#fef2f2" />
                  <MatrixCell label="A22 = −m2ω²+K1+K2" value={<ComplexVal c={detailAtF0.A22} />} bg="#fffbeb" />
                  <MatrixCell label="A33 = −m3ω²+K2+K3" value={<ComplexVal c={detailAtF0.A33} />} bg="#eff6ff" />
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
                  <MatrixCell label="Terme intermédiaire: A22·A33 − K2²" value={<ComplexVal c={detailAtF0.inner} />} bg="#f0fdf4" />
                  <MatrixCell label="det[A] = A11·(A22·A33−K2²) − K1²·A33" value={<ComplexVal c={detailAtF0.detSys} />} bg="#f0fdf4" />
                </div>
                <MatrixCell label="Numérateur T_sys = K1·K2·K3" value={<ComplexVal c={detailAtF0.numSys} />} bg="#f0fdf4" />

                {/* Résultats finaux T_sys et T_ref */}
                <h4 style={{ fontSize: 13, color: '#0f172a', marginBottom: 8, marginTop: 20 }}>4. Fonctions de transfert résultantes</h4>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <div style={{ padding: 14, background: '#fff7ed', border: '1px solid #fed7aa', borderRadius: 8 }}>
                    <div style={{ fontWeight: 700, color: '#c2410c', fontSize: 13, marginBottom: 8 }}>T_sys (Système à 3 étages, à f₀ = {f0_dyn} Hz)</div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: '#7c2d12', marginBottom: 8 }}>
                      T_sys = K1·K2·K3 / det[A]
                    </div>
                    <div className="math-val" style={{ fontSize: 11.5, wordBreak: 'break-all' }}>
                      = <ComplexVal c={detailAtF0.numSys} /> / <ComplexVal c={detailAtF0.detSys} />
                    </div>
                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid #fed7aa', display: 'flex', justifyContent: 'space-between' }}>
                      <span className="math-lbl">|T_sys|</span>
                      <span className="math-val" style={{ fontWeight: 700 }}>{detailAtF0.tfSysMag.toExponential(4)}</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span className="math-lbl">T_sys en dB = 20·log₁₀|T_sys|</span>
                      <span className="math-val" style={{ fontWeight: 700, color: '#c2410c' }}>{detailAtF0.tfSysDb.toFixed(2)} dB</span>
                    </div>
                  </div>

                  <div style={{ padding: 14, background: '#f8fafc', border: '1px solid #cbd5e1', borderRadius: 8 }}>
                    <div style={{ fontWeight: 700, color: '#475569', fontSize: 13, marginBottom: 8 }}>T_ref (Rail pad seul, à f = {f_ref_dyn} Hz)</div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: '#334155', marginBottom: 8 }}>
                      T_ref = K1 / (−m1ω² + K1)
                    </div>
                    <div className="math-val" style={{ fontSize: 12 }}>
                      = <ComplexVal c={detailAtFref.k1c} /> / <ComplexVal c={detailAtFref.termRef} />
                    </div>
                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid #cbd5e1', display: 'flex', justifyContent: 'space-between' }}>
                      <span className="math-lbl">|T_ref|</span>
                      <span className="math-val" style={{ fontWeight: 700 }}>{detailAtFref.tfRefMag.toExponential(4)}</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span className="math-lbl">T_ref en dB = 20·log₁₀|T_ref|</span>
                      <span className="math-val" style={{ fontWeight: 700, color: '#475569' }}>{detailAtFref.tfRefDb.toFixed(2)} dB</span>
                    </div>
                  </div>
                </div>

                <div style={{ marginTop: 16, padding: 12, background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: 8, fontSize: 12, color: '#1e40af', lineHeight: 1.6 }}>
                  <strong>Note :</strong> le système possède désormais <strong>3 fréquences propres</strong> (voir carte "Impédances"
                  ci-dessus) au lieu d'une seule pour le modèle à 2 étages — chaque étage de suspension ajoute un mode.
                  T_sys et T_ref sont recalculés à chaque fréquence du spectre (4 à 250 Hz) selon exactement les mêmes
                  formules — seules ω, K1(ω), K2(ω) et K3(ω) changent. La perte par insertion tracée dans l'onglet
                  Graphiques est <strong>IL(f) = 20·log₁₀|T_ref(f)| − 20·log₁₀|T_sys(f)|</strong> pour chaque fréquence du tableau.
                </div>

                {/* Tableau complet des valeurs intermédiaires pour toutes les fréquences */}
                <h4 style={{ fontSize: 13, color: '#0f172a', marginBottom: 8, marginTop: 24 }}>5. Table complète des valeurs intermédiaires (toutes fréquences)</h4>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 10.5, fontFamily: "'IBM Plex Mono', monospace" }}>
                    <thead>

                        {['f (Hz)', 'ω (rad/s)', '|K1|', '|K2|', '|K3|', '−m1ω²', '−m2ω²', '−m3ω²', '|det[A]|', 'T_sys (dB)', 'T_ref (dB)', 'IL (dB)'].map(h => (

                            <td style={{ textAlign: 'right', padding: '4px 6px', fontWeight: 700 }}>{d.f}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#64748b' }}>{det.w.toFixed(1)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px' }}>{det.K1mag.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px' }}>{det.K2mag.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px' }}>{det.K3mag.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#94a3b8' }}>{det.m1w2.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#94a3b8' }}>{det.m2w2.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#94a3b8' }}>{det.m3w2.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#94a3b8' }}>{det.detMag.toExponential(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#c2410c', fontWeight: 600 }}>{d.Tsys.toFixed(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: '#64748b' }}>{d.Tref.toFixed(2)}</td>
                            <td style={{ textAlign: 'right', padding: '4px 6px', color: d.IL < 0 ? '#dc2626' : '#059669', fontWeight: 700 }}>{d.IL.toFixed(2)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          )}

          {activeTab === 'ai' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
              
              <div className="card" style={{ background: 'linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%)', border: '1px solid #c7d2fe' }}>
                <h3 style={{ marginTop: 0, fontSize: 18, color: '#312e81', display: 'flex', alignItems: 'center', gap: 8 }}>
                  ✨ Centre de Commandes IA
                </h3>
                <p style={{ fontSize: 13, color: '#4338ca', marginBottom: 20 }}>
                  Générez des rapports, explorez des recommandations commerciales, ou écoutez un résumé vocal synthétisé de votre VDF actuelle.
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <button className="gemini-btn" onClick={handleGenerateReport} disabled={isAiLoading}>
                    📝 Rapport Technique (Markdown)
                  </button>
                  <button className="gemini-btn secondary" onClick={handleGenerateLayman} disabled={isAiLoading}>

                  </button>

                  </button>

                  </button>
                </div>

                <div style={{ marginTop: 24, paddingTop: 20, borderTop: '1px solid #c7d2fe' }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: '#312e81', display: 'block', marginBottom: 8 }}>
                    💬 Poser une question spécifique à l'Ingénieur IA :
                  </label>
                  <div style={{ display: 'flex', gap: 12 }}>
                    <input 
                      type="text" 
                      className="ai-textarea" 
                      style={{ margin: 0, minHeight: 'auto', flex: 1, fontSize: 14, padding: 12 }}
                      placeholder="Que se passe-t-il si la rigidité du tapis vieillit (+20%) ?"
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && handleChat()}
                    />
                    <button className="gemini-btn" style={{ width: 'auto', padding: '0 24px' }} onClick={handleChat} disabled={isAiLoading || !chatInput}>
                      Demander
                    </button>
                  </div>
                </div>
              </div>

              {/* Affichage des résultats / Lecteur Audio */}
              {(isAiLoading || aiMainContent || audioUrl) && (
                <div className="card" ref={aiContentRef} style={{ minHeight: 200, padding: 30 }}>
                  {isAiLoading ? (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#6366f1' }}>
                      <div style={{ fontSize: 24, marginBottom: 16 }}>✨</div>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>L'IA interagit avec le modèle...</div>
                    </div>
                  ) : (
                    <>
                      {audioUrl && (
                        <div style={{ marginBottom: 24, padding: 20, background: '#f0fdf4', borderRadius: 8, border: '1px solid #bbf7d0' }}>
                          <h4 style={{ margin: '0 0 12px 0', color: '#166534', fontSize: 14 }}>▶️ Lecteur Audio (Voix de Synthèse)</h4>
                          <audio src={audioUrl} controls autoPlay style={{ width: '100%' }} />
                        </div>
                      )}
                      <FormattedText text={aiMainContent} />
                    </>
                  )}
                </div>
              )}

            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
